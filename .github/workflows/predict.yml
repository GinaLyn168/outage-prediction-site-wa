name: Update outage risk

on:
  schedule:
    - cron: "0 8 * * *"   # 8 AM UTC -> 1 AM PS(D?)T
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install xgboost pandas numpy requests scikit-learn

      - name: Run prediction script
        run: |
          python predict.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"

          git add county_outage_risk_wa.json

          git diff --staged --quiet || git commit -m "Update outage predictions"
          git push